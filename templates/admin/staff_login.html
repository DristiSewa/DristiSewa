{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DristiSewa Login</title>

    <link rel="stylesheet" href="{% static 'css/pages/admin/staff_login.css' %}">
</head>

<body>

<div class="login-container">

    <div class="logo-section">
        <img src="{% static 'images/logo.png' %}" alt="Logo" style="width:180px;">
        <h2>DristiSewa</h2>
    </div>

    <div class="divider">
        <span>Login</span>
    </div>

    <form method="POST" action="{% url 'accounts:staff_login' %}">
        {% csrf_token %}

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <!-- ROLE -->
        <div class="form-group">
            <label>Role:</label>
            <select name="role" required>
                <option value="" disabled selected>Select Role</option>

                <!-- 🔥 FIXED VALUES (backend match हुने गरी) -->
                <option value="admin">Admin</option>
                <option value="manager">Manager</option>
                <option value="front desk">Front Desk</option>
            </select>
        </div>

        <!-- EMAIL -->
        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" placeholder="Enter email" required>
        </div>

        <!-- PASSWORD -->
        <div class="form-group">
            <label>Password:</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

</div>

</body>
</html>
