{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch Staff Login - DristiSewa</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/tailwind.min.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/pages/registration/staff_login.css' %}">
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 overflow-x-hidden relative antialiased">

    <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-600/15 rounded-full filter blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-indigo-500/15 rounded-full filter blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-lg luxury-glass-card rounded-3xl p-8 sm:p-12 relative z-10 text-slate-900 transition-all duration-300">

        <div class="flex flex-col items-center text-center mb-8">
            <div class="p-1 bg-white rounded-xl shadow-sm border border-blue-50 mb-4 transform hover:scale-105 transition duration-300">
                <img src="{% static 'images/logo.png' %}" alt="Logo" class="h-20 w-auto object-contain">
            </div>

            <div class="w-full flex items-center justify-center gap-4 mt-2">
                <div class="h-[1.5px] bg-blue-100 flex-grow"></div>
                <span class="text-xl font-extrabold tracking-tight text-blue-600 uppercase text-xs tracking-widest">Branch Staff Login</span>
                <div class="h-[1.5px] bg-blue-100 flex-grow"></div>
            </div>
            <p class="text-xs font-medium text-slate-400 mt-3">For Admin, Manager &amp; Front Desk staff</p>
        </div>

        {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                    <div class="p-3.5 text-sm text-red-600 bg-red-50 border border-red-100 font-semibold rounded-xl text-center shadow-inner">
                        <i class="fa-solid fa-circle-exclamation mr-2"></i>{{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form action="{% url 'accounts:staff_login' %}" method="POST" class="space-y-5">
            {% csrf_token %}

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-blue-700 tracking-wide uppercase">Login As</label>
                <div class="relative flex items-center">
                    <select name="role" required
                            class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 text-sm font-medium outline-none transition input-glow appearance-none">
                        <option value="" disabled {% if not form.role.value %}selected{% endif %}>Select your role</option>
                        {% for value, label in form.fields.role.choices %}
                            <option value="{{ value }}" {% if form.role.value == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                    <i class="fa-solid fa-user-tie absolute left-4 text-slate-400 text-base transition-colors pointer-events-none"></i>
                    <i class="fa-solid fa-chevron-down absolute right-4 text-slate-400 text-xs pointer-events-none"></i>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-blue-700 tracking-wide uppercase">Email ID</label>
                <div class="relative flex items-center">
                    <input type="email" name="email" placeholder="Enter your staff email" required
                           value="{{ form.email.value|default:'' }}"
                           class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 text-sm font-medium outline-none transition input-glow placeholder:text-slate-400">
                    <i class="fa-regular fa-envelope absolute left-4 text-slate-400 text-base transition-colors pointer-events-none"></i>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-blue-700 tracking-wide uppercase">Password</label>
                <div class="relative flex items-center">
                    <input type="password" name="password" placeholder="Enter your password" required
                           class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 text-sm font-medium outline-none transition input-glow placeholder:text-slate-400">
                    <i class="fa-solid fa-lock absolute left-4 text-slate-400 text-base transition-colors pointer-events-none"></i>
                </div>
            </div>

            <button type="submit" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-extrabold text-sm tracking-wider uppercase rounded-xl shadow-lg shadow-blue-600/30 transition transform hover:-translate-y-0.5 active:translate-y-0 mt-6">
                Login <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i>
            </button>
        </form>

    </div>

</body>
</html>
