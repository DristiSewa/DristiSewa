{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperAdmin Login - DristiSewa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/pages/superadmin/login.css' %}">
</head>
<body>
    <div class="login-container">
        <!-- Logo & Branding -->
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-lock"></i>
            </div>
            <h1 class="logo-title">SuperAdmin</h1>
            <p class="logo-subtitle">DristiSewa Database Management</p>
        </div>

        <!-- Messages -->
        {% if messages %}
        {% for message in messages %}
        <div class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <!-- Login Form -->
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label" for="email">
                    <i class="fas fa-envelope" style="margin-right: 6px;"></i>
                    Superadmin Email
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-input"
                    placeholder="admin@dristisewa.com"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">
                    <i class="fas fa-lock" style="margin-right: 6px;"></i>
                    Password
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
                Login to SuperAdmin
            </button>
        </form>

        <!-- Security Badge -->
        <div class="security-badge">
            <i class="fas fa-shield-alt"></i>
            Secure login with encrypted connection
        </div>
    </div>

    <script src="{% static 'js/pages/superadmin/login.js' %}"></script>
</body>
</html>
