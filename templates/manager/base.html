{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DristiSewa{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* ==========================================================================
           DRISTISEWA MANAGER DASHBOARD — UNIFIED DESIGN SYSTEM
           ========================================================================== */

        /* --------------------------------------------------------------------------
           DESIGN TOKENS
           -------------------------------------------------------------------------- */
        :root {
            --sidebar-width: 256px;
            --content-padding: 32px;
            --primary: #2b35d2;
            --primary-dark: #1e257c;
            --bg: #f4f6fb;
            --surface: #ffffff;
            --border: #e2e8f0;
            --border-hover: #c8d3e0;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.04);
            --shadow-md: 0 6px 20px rgba(15, 23, 42, 0.07);
            --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.09);
        }

        /* --------------------------------------------------------------------------
           RESET
           -------------------------------------------------------------------------- */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --------------------------------------------------------------------------
           LAYOUT
           -------------------------------------------------------------------------- */
        .wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* --------------------------------------------------------------------------
           SIDEBAR
           -------------------------------------------------------------------------- */
        .new-sidebar {
            width: 256px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
        }

        .new-sidebar-inner {
            padding: 24px 16px;
        }

        .new-sidebar-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(226,232,240,0.8);
            gap: 8px;
        }

        .new-sidebar-brand img {
            height: 56px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.08));
        }

        .new-sidebar-brand h1 {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: #1e3a8a;
        }

        .new-nav { display: flex; flex-direction: column; gap: 20px; }

        .new-nav-group { display: flex; flex-direction: column; gap: 2px; }

        .new-nav-label {
            font-size: 10.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            padding: 0 12px;
            margin-bottom: 4px;
        }

        .new-nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .new-nav-link i {
            width: 20px;
            min-width: 20px;
            font-size: 15px;
            text-align: center;
        }

        .new-nav-link:hover {
            background: rgba(226,232,240,0.7);
            color: #1e293b;
        }

        .new-nav-link.active {
            background: #dbeafe;
            color: #1d4ed8;
            box-shadow: 0 1px 3px rgba(59,130,246,0.12);
        }

        .new-nav-link.active i { color: #2563eb; }

        .new-sidebar-footer {
            padding: 16px 16px 14px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-user-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
        }

        .sidebar-user-avatar {
            width: 34px;
            height: 34px;
            min-width: 34px;
            background: linear-gradient(135deg, #3b82f6, #2b35d2);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            flex-shrink: 0;
            letter-spacing: 0.02em;
        }

        .sidebar-user-info { min-width: 0; }

        .sidebar-user-name {
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .sidebar-user-meta {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px;
            line-height: 1.3;
        }

        .new-nav-logout {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            transition: background 0.15s, color 0.15s;
        }

        .new-nav-logout i { width: 20px; min-width: 20px; font-size: 15px; text-align: center; }

        .new-nav-logout:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        /* --------------------------------------------------------------------------
           MAIN CONTENT
           -------------------------------------------------------------------------- */
        .main-content {
            margin-left: 256px;
            flex: 1;
            padding: var(--content-padding);
            background: var(--bg);
            min-height: 100vh;
            max-width: calc(100vw - 256px);
            overflow-x: hidden;
        }

        /* --------------------------------------------------------------------------
           SHARED SURFACE
           -------------------------------------------------------------------------- */
        .surface {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .surface:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-md);
        }

        /* --------------------------------------------------------------------------
           STAT CARDS (header panel)
           -------------------------------------------------------------------------- */
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            background: var(--surface);
            padding: 28px 32px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            margin-bottom: 28px;
        }

        .cards-wrapper {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 20px;
            flex: 1;
        }

        .stat-card {
            padding: 24px;
            min-height: 140px;
            border-radius: var(--radius-lg);
            border: 1px solid;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: transform 0.18s, box-shadow 0.18s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .card-blue  { background: #eff6ff; border-color: #dbeafe; }
        .card-amber { background: #fffbeb; border-color: #fde68a; }
        .card-pink  { background: #fdf2f8; border-color: #fce7f3; }

        .icon-square {
            width: 56px;
            height: 56px;
            min-width: 56px;
            background: #fff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            flex-shrink: 0;
        }

        .icon-square.blue  { color: #2563eb; }
        .icon-square.amber { color: #d97706; }
        .icon-square.pink  { color: #db2777; }

        .card-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .card-value {
            font-size: 38px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .user-meta { text-align: right; }

        .user-meta .name {
            font-weight: 700;
            font-size: 15px;
            color: #1e293b;
            line-height: 1.2;
        }

        .user-meta .role {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .avatar-circle {
            width: 50px;
            height: 50px;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        /* --------------------------------------------------------------------------
           FOLLOWUP TABLE CONTAINER
           -------------------------------------------------------------------------- */
        .data-table-container {
            background: var(--surface);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .data-table-container:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-md);
        }

        .table-header-bar {
            padding: 24px 28px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .table-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .table-actions {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .search-input-wrapper {
            position: relative;
            flex: 0 0 340px;
        }

        .search-input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
        }

        .search-bar {
            width: 100%;
            height: 44px;
            padding: 0 16px 0 44px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .search-bar:hover { border-color: var(--border-hover); }

        .search-bar:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(43, 53, 210, 0.1);
        }

        .filter-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .filter-dropdown {
            height: 44px;
            padding: 0 14px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .filter-dropdown:hover { border-color: var(--border-hover); }

        .filter-dropdown:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(43, 53, 210, 0.1);
        }

        /* --------------------------------------------------------------------------
           TABLES (shared)
           -------------------------------------------------------------------------- */
        .responsive-table-holder {
            overflow-x: auto;
            width: 100%;
        }

        .custom-table,
        .ledger-matrix-table,
        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .custom-table th,
        .ledger-matrix-table th,
        .report-table th {
            background: #f9fbfd;
            padding: 14px 18px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
            border-bottom: 2px solid var(--border);
        }

        .custom-table td,
        .ledger-matrix-table td,
        .report-table td {
            padding: 0 18px;
            height: 60px;
            border-bottom: 1px solid #f1f5f9;
            color: #273449;
            vertical-align: middle;
        }

        .custom-table tbody tr,
        .ledger-matrix-table tbody tr,
        .report-table tbody tr {
            transition: background 0.15s;
        }

        .custom-table tbody tr:hover,
        .ledger-matrix-table tbody tr:hover,
        .report-table tbody tr:hover {
            background: #f7faff;
        }

        .custom-table thead { border-bottom: 2px solid var(--primary); }

        .table-footer {
            padding: 18px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            border-top: 1px solid #f1f5f9;
            background: #fafbfd;
        }

        .pagination-btns { display: flex; gap: 6px; }

        .page-btn {
            padding: 8px 13px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: #475569;
            transition: background 0.15s;
        }

        .page-btn:hover { background: #f1f5f9; }

        .page-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* Table cell helpers */
        .text-center   { text-align: center; }
        .muted-cell    { color: var(--text-secondary); font-weight: 500; }
        .phone-cell    { font-family: 'SF Mono', 'Fira Code', monospace; font-weight: 600; color: #334155; font-size: 13px; }
        .strong-cell   { font-weight: 600; color: #334155; }

        .student-link {
            background: none;
            border: none;
            padding: 0;
            color: var(--primary);
            font: inherit;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
        }

        .student-link:hover { text-decoration: underline; }

        .ledger-matrix-table td a.student-link,
        .report-table td a.student-link,
        .custom-table td a.student-link {
            color: var(--primary) !important;
        }

        .country-tag {
            display: inline-block;
            padding: 5px 11px;
            background: #f1f5f9;
            color: #334155;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .date-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .date-normal  { background: #f1f5f9; color: #475569; }
        .date-today   { background: #fff9db; color: #9a5b00; border: 1px solid #ffe066; }
        .date-overdue { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }

        .status-select {
            height: 38px;
            width: 200px;
            padding: 0 12px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            cursor: pointer;
            outline: none;
            appearance: none;
            transition: border-color 0.15s;
        }

        .status-select:hover { border-color: var(--border-hover); }

        .status-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(43, 53, 210, 0.1);
        }

        /* --------------------------------------------------------------------------
           BRANCH MONITORING
           -------------------------------------------------------------------------- */
        .monitoring-container { width: 100%; }

        .monitoring-workspace-grid {
            display: grid;
            grid-template-columns: 360px minmax(0, 1fr);
            gap: 28px;
            width: 100%;
        }

        .monitor-panel-box {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            min-width: 0;
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .monitor-panel-box:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-md);
        }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
        }

        .panel-title { font-size: 16px; font-weight: 800; color: var(--text-primary); }

        .staff-matrix-list { padding: 4px 20px; list-style: none; }

        .staff-matrix-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 18px 0;
            border-bottom: 1px dashed var(--border);
        }

        .staff-matrix-item:last-child { border-bottom: none; }

        .staff-details {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .staff-avatar-icon {
            width: 52px;
            height: 52px;
            min-width: 52px;
            background: #e0e7ff;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
        }

        .staff-identity-name  { font-weight: 700; color: #1e293b; font-size: 15px; margin-bottom: 3px; }
        .staff-workload-meta  { font-size: 13px; color: var(--text-secondary); font-weight: 500; }

        .badge-staff-status {
            display: inline-flex;
            align-items: center;
            font-size: 11px;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 999px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .badge-staff-online  { background: #ecfdf5; color: #065f46; }
        .badge-staff-online i  { color: #22c55e; }
        .badge-staff-offline { background: #f1f5f9; color: #64748b; }
        .badge-staff-offline i { color: #94a3b8; }

        .branch-pill {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 999px;
            background: #eef2ff;
            color: var(--primary);
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .ledger-matrix-table th { border-bottom: 2px solid var(--border); }
        .assigned-handler { font-weight: 600; color: #475569; }
        .actions-column   { text-align: center; width: 120px; }
        .empty-actions    { color: #cbd5e1; font-size: 16px; font-weight: bold; }

        .file-link-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: #fff;
            color: #475569;
            margin-right: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.18s;
            text-decoration: none;
        }

        .file-link-action:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .state-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 5px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            text-transform: capitalize;
            white-space: nowrap;
            line-height: 1;
        }

        .state-completed { background: #dcfce7; color: #15803d; }
        .state-pending   { background: #fef3c7; color: #d97706; }

        .document-entry {
            font-size: 13px;
            margin-bottom: 5px;
            color: #475569;
            font-weight: 500;
        }

        .document-entry i { margin-right: 7px; color: #e71d36; font-size: 14px; }
        .empty-document-note { color: var(--text-muted); font-size: 13px; font-style: italic; }

        /* --------------------------------------------------------------------------
           FRONT DESK STAFF PAGE
           -------------------------------------------------------------------------- */
        .frontdesk-container { display: flex; flex-direction: column; gap: 24px; }

        .page-header-box {
            background: var(--surface);
            padding: 24px 28px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .page-header-box:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-md);
        }

        .header-info h1  { font-size: 20px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
        .header-info p   { font-size: 14px; color: var(--text-secondary); line-height: 1.45; }

        .add-staff-btn {
            background: var(--primary);
            color: #fff;
            padding: 0 20px;
            height: 44px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 14px;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.18s;
            white-space: nowrap;
            text-decoration: none;
        }

        .add-staff-btn:hover { background: var(--primary-dark); }

        .staff-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 22px;
        }

        .staff-profile-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .staff-profile-card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-md);
        }

        .card-top-identity {
            padding: 22px 24px;
            background: #f9fbfd;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .large-avatar {
            width: 54px;
            height: 54px;
            min-width: 54px;
            background: #e0e7ff;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }

        .identity-text h3   { font-size: 17px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
        .identity-text span { font-size: 13px; color: var(--text-secondary); font-weight: 500; display: block; margin-bottom: 3px; }

        .created-at-date {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-actions-panel {
            padding: 16px 22px;
            background: #fff;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-action-edit,
        .btn-action-delete {
            height: 38px;
            padding: 0 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.18s;
        }

        .btn-action-edit   { background: #f1f5f9; color: #334155; }
        .btn-action-edit:hover { background: #e2e8f0; color: var(--text-primary); }
        .btn-action-delete { background: #fef2f2; color: #dc2626; }
        .btn-action-delete:hover { background: #fee2e2; }

        /* --------------------------------------------------------------------------
           MODALS
           -------------------------------------------------------------------------- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .modal-sheet-box {
            background: #fff;
            width: 100%;
            max-width: 480px;
            border-radius: var(--radius-xl);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.14);
            overflow: hidden;
            animation: modalPop 0.22s ease-out;
        }

        @keyframes modalPop {
            from { transform: scale(0.95); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        .modal-header {
            padding: 22px 28px;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
        }

        .modal-header h2 { font-size: 19px; font-weight: 700; color: var(--text-primary); }

        .close-modal-btn {
            width: 36px;
            height: 36px;
            background: none;
            border: none;
            font-size: 18px;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: background 0.15s;
        }

        .close-modal-btn:hover { background: #eef2f7; color: #334155; }

        .modal-body-form {
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-input-group { display: flex; flex-direction: column; gap: 7px; }
        .form-input-group label { font-size: 13px; font-weight: 700; color: #475569; }

        .form-input-group input {
            height: 46px;
            padding: 0 14px;
            border: 1px solid #cbd5e1;
            border-radius: var(--radius-sm);
            font-size: 15px;
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .form-input-group input:hover { border-color: var(--border-hover); }

        .form-input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(43, 53, 210, 0.1);
        }

        .modal-footer-actions {
            padding: 18px 28px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn-cancel {
            height: 40px;
            padding: 0 16px;
            background: #f1f5f9;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 14px;
            color: #475569;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-cancel:hover { background: #e2e8f0; }

        .btn-danger-confirm {
            height: 40px;
            padding: 0 16px;
            background: #dc2626;
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-danger-confirm:hover { background: #b91c1c; }

        /* --------------------------------------------------------------------------
           REPORTS & ANALYTICS
           -------------------------------------------------------------------------- */
        .analytics-container { width: 100%; }

        .analytics-title { font-size: 22px; font-weight: 800; color: var(--text-primary); margin-bottom: 24px; }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .metric-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            min-height: 140px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
        }

        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--border-hover);
        }

        .metric-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .metric-card-title { font-size: 12px; text-transform: uppercase; color: var(--text-secondary); font-weight: 700; letter-spacing: 0.06em; }

        .metric-card-icon {
            width: 46px;
            height: 46px;
            min-width: 46px;
            background: #e0e7ff;
            color: var(--primary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .metric-card-value  { font-size: 38px; font-weight: 800; color: var(--text-primary); line-height: 1; }
        .metric-card-trend  { font-size: 13px; font-weight: 500; margin-top: 10px; }
        .trend-up   { color: #16a34a; }
        .trend-down { color: #dc2626; }

        .visualization-row {
            display: flex;
            gap: 24px;
            margin-bottom: 28px;
            align-items: stretch;
        }

        .chart-box {
            flex: 2;
            background: var(--surface);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            padding: 28px;
            min-height: 450px;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .chart-box:hover { border-color: var(--border-hover); box-shadow: var(--shadow-md); }

        .breakdown-box {
            flex: 1;
            background: var(--surface);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            padding: 28px;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .breakdown-box:hover { border-color: var(--border-hover); box-shadow: var(--shadow-md); }

        .section-heading { font-size: 16px; font-weight: 800; color: var(--text-primary); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

        .bar-chart-mock {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 350px;
            padding-top: 20px;
            border-bottom: 2px solid var(--border);
            gap: 8px;
        }

        .bar-column { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 10px; min-width: 0; }

        .bar-fill {
            width: 100%;
            max-width: 72px;
            background: linear-gradient(180deg, #4f46e5, var(--primary));
            border-radius: 8px 8px 0 0;
            box-shadow: 0 6px 18px rgba(43, 53, 210, 0.2);
        }

        .bar-fill-jan { height: 130px; }
        .bar-fill-feb { height: 180px; }
        .bar-fill-mar { height: 270px; }
        .bar-fill-apr { height: 220px; }
        .bar-fill-may { height: 330px; }
        .bar-fill-jun { height: 295px; }

        .bar-label { font-size: 13px; color: var(--text-secondary); font-weight: 600; }

        .rank-list { list-style: none; }

        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            padding: 16px 0;
            border-bottom: 1px dashed var(--border);
            min-height: 54px;
        }

        .rank-item:last-child { border-bottom: none; }
        .rank-name  { font-size: 15px; color: #334155; font-weight: 500; }

        .rank-badge {
            background: #eef2ff;
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            white-space: nowrap;
        }

        .table-card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            padding: 28px;
            box-shadow: var(--shadow-sm);
            overflow-x: auto;
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .table-card:hover { border-color: var(--border-hover); box-shadow: var(--shadow-md); }
        .report-table th  { border-bottom: 2px solid var(--border); }
        .conversion-percentage { font-weight: 700; color: #16a34a; }

        /* --------------------------------------------------------------------------
           RESPONSIVE BREAKPOINTS
           -------------------------------------------------------------------------- */
        @media (max-width: 1536px) {
            :root { --content-padding: 28px; }
            .main-content { margin-left: 256px; max-width: calc(100vw - 256px); }
            .cards-wrapper { gap: 16px; }
            .card-value, .metric-card-value { font-size: 34px; }
        }

        @media (max-width: 1366px) {
            :root { --content-padding: 24px; }
            .table-header-bar { flex-direction: column; align-items: flex-start; }
            .table-actions { width: 100%; justify-content: space-between; }
            .search-input-wrapper { flex: 1 1 280px; }
            .visualization-row { flex-direction: column; }
            .chart-box { min-height: 380px; }
            .bar-chart-mock { height: 300px; }
        }

        @media (max-width: 1100px) {
            .monitoring-workspace-grid { grid-template-columns: 1fr; }
            .metrics-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .cards-wrapper { grid-template-columns: 1fr; }
            .header-panel { flex-direction: column; align-items: flex-start; }
            .user-badge { align-self: flex-end; }
        }

        @media (max-width: 900px) {
            .main-content { margin-left: 0; max-width: 100%; padding: 20px; }
            .metrics-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (max-width: 640px) {
            .metrics-grid, .staff-cards-grid { grid-template-columns: 1fr; }
            .cards-wrapper { grid-template-columns: 1fr; }
            .bar-chart-mock { height: 220px; }
            .table-actions { flex-direction: column; }
            .search-input-wrapper { flex: none; width: 100%; }
            .filter-dropdown { width: 100%; }
            .table-footer { flex-direction: column; align-items: flex-start; }
        }

        /* ── Branch Student Tracker alignment fix ──────────────────────────────
           Problem: no table-layout:fixed → browser auto-sizes columns from
           content width → "Tracking" badge column fluctuates → header/body
           widths never match.
           Fix: .bst-fix class + colgroup in the template.
           Columns: Student 35% | Assigned By 28% | Country 17% | Tracking 20%  */
        /* Branch Student Tracker — 7 columns: Student | Phone | Email | Assigned By | Country | Application | Tracking */
        .bst-fix { table-layout: fixed; width: 100%; }
        .bst-fix .bst-c1 { width: 20%; }
        .bst-fix .bst-c2 { width: 12%; }
        .bst-fix .bst-c3 { width: 22%; }
        .bst-fix .bst-c4 { width: 12%; }
        .bst-fix .bst-c5 { width: 10%; }

        .bst-fix thead th:nth-child(1),
        .bst-fix tbody td:nth-child(1),
        .bst-fix thead th:nth-child(3),
        .bst-fix tbody td:nth-child(3) { text-align: left; }

        .bst-fix thead th:nth-child(2),
        .bst-fix tbody td:nth-child(2),
        .bst-fix thead th:nth-child(4),
        .bst-fix tbody td:nth-child(4),
        .bst-fix thead th:nth-child(5),
        .bst-fix tbody td:nth-child(5),
        .bst-fix thead th:nth-child(6),
        .bst-fix tbody td:nth-child(6),
        .bst-fix thead th:nth-child(7),
        .bst-fix tbody td:nth-child(7) { text-align: center; }

        /* Keep every cell on a single line; truncate with ellipsis if needed */
        .bst-fix tbody td {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            vertical-align: middle;
        }
        .bst-fix tbody td:nth-child(3) {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            color: #475569;
        }
        .bst-fix tbody td:nth-child(2) {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
        }

        /* ── Reports Performance Index alignment fix ────────────────────────────
           Problem: no table-layout:fixed → "Conversion Efficiency" header bloats
           its column → all numeric columns starved. No text-align on th → headers
           left-align while body cells appear centred (symmetric padding mismatch).
           Fix: .rpt-fix class + colgroup in the template.
           Columns: Name 26% | 4 numeric cols 13% each | Conversion 22%         */
        .rpt-fix { table-layout: fixed; width: 100%; }
        .rpt-fix .rpt-c1 { width: 26%; }
        .rpt-fix .rpt-c2 { width: 13%; }
        .rpt-fix .rpt-c3 { width: 13%; }
        .rpt-fix .rpt-c4 { width: 13%; }
        .rpt-fix .rpt-c5 { width: 13%; }
        .rpt-fix .rpt-c6 { width: 22%; }
        /* Name column: left-aligned in both header and body */
        .rpt-fix thead th:nth-child(1),
        .rpt-fix tbody td:nth-child(1) {
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 0;
        }
        /* Numeric columns: center-aligned in both header and body,
           tabular-nums so digits stack in perfect vertical columns  */
        .rpt-fix thead th:nth-child(n+2),
        .rpt-fix tbody td:nth-child(n+2) {
            text-align: center;
            font-variant-numeric: tabular-nums;
            vertical-align: middle;
            white-space: nowrap;
        }

    </style>
</head>
<body>
    <div class="wrapper">

        <aside class="new-sidebar">
            <div class="new-sidebar-inner">
                <!-- Brand -->
                <div class="new-sidebar-brand">
                    <img src="{% static 'images/logo.png' %}" alt="DristiSewa Logo">
                    <h1>DristiSewa</h1>
                </div>
                <!-- Navigation -->
                <nav class="new-nav">
                    <div class="new-nav-group">
                        <p class="new-nav-label">Overview</p>
                        <a href="{% url 'accounts:branch_monitoring' %}"
                           class="new-nav-link {% if 'branch-monitoring' in request.path %}active{% endif %}">
                            <i class="fa-solid fa-code-branch"></i>
                            <span>Branch Monitoring</span>
                        </a>
                    </div>
                    <div class="new-nav-group">
                        <p class="new-nav-label">Management</p>
                        <a href="{% url 'accounts:followup_management' %}"
                           class="new-nav-link {% if 'followup-management' in request.path %}active{% endif %}">
                            <i class="fa-solid fa-bars-progress"></i>
                            <span>Followup Management</span>
                        </a>
                        <a href="{% url 'accounts:front_desk' %}"
                           class="new-nav-link {% if 'front-desk' in request.path %}active{% endif %}">
                            <i class="fa-solid fa-user-gear"></i>
                            <span>Front-desk Users</span>
                        </a>
                        <a href="{% url 'accounts:reports' %}"
                           class="new-nav-link {% if 'reports' in request.path %}active{% endif %}">
                            <i class="fa-solid fa-chart-line"></i>
                            <span>Reports &amp; Analytics</span>
                        </a>
                    </div>
                </nav>
            </div>
            <!-- Footer: Logout -->
            <div class="new-sidebar-footer">
                <a href="{% url 'accounts:logout' %}" class="new-nav-logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initFrontDeskStaffModal();
        });

        /* ==========================================================================
           FRONT DESK STAFF MODALS
           ========================================================================== */
        function initFrontDeskStaffModal() {
            const staffModal  = document.getElementById('staffFormModal');
            const deleteModal = document.getElementById('deleteConfirmModal');

            if (!staffModal || !deleteModal) return;

            const modalTitle     = document.getElementById('modalTitle');
            const modalSubmitBtn = document.getElementById('modalSubmitBtn');
            const passwordLabel  = document.getElementById('passwordLabel');
            const nameInput      = document.getElementById('staff_name');
            const emailInput     = document.getElementById('staff_email');
            const passwordInput  = document.getElementById('staff_password');
            const deleteTargetName = document.getElementById('deleteTargetName');
            const formActionInput = document.getElementById('form_action');
            const staffIdInput    = document.getElementById('staff_id');
            const deleteStaffIdInput = document.getElementById('delete_staff_id');

            if (!modalTitle || !modalSubmitBtn || !passwordLabel ||
                !nameInput || !emailInput || !passwordInput || !deleteTargetName) return;

            function openCreateModal() {
                modalTitle.innerText     = "Create Front Desk Staff";
                modalSubmitBtn.innerText = "Create Staff Account";
                passwordLabel.innerText  = "Account Password";
                nameInput.value     = "";
                emailInput.value    = "";
                passwordInput.value = "";
                passwordInput.required = true;
                if (formActionInput) formActionInput.value = "create";
                if (staffIdInput) staffIdInput.value = "";
                staffModal.style.display = 'flex';
            }

            function openEditModal(name, email, staffId) {
                modalTitle.innerText     = `Edit Front Desk: ${name}`;
                modalSubmitBtn.innerText = "Update Account Details";
                passwordLabel.innerText  = "New Password (leave blank to keep current)";
                nameInput.value     = name;
                emailInput.value    = email || "";
                passwordInput.value = "";
                passwordInput.required = false;
                if (formActionInput) formActionInput.value = "edit";
                if (staffIdInput) staffIdInput.value = staffId || "";
                staffModal.style.display = 'flex';
            }

            function openDeleteModal(name, staffId) {
                deleteTargetName.innerText = `"${name}"`;
                if (deleteStaffIdInput) deleteStaffIdInput.value = staffId || "";
                deleteModal.style.display  = 'flex';
            }

            function closeAllModals() {
                staffModal.style.display  = 'none';
                deleteModal.style.display = 'none';
            }

            document.getElementById('openCreateStaffModalBtn')?.addEventListener('click', openCreateModal);

            document.querySelectorAll('.btn-action-edit').forEach(btn => {
                btn.addEventListener('click', () => openEditModal(btn.dataset.staffName, btn.dataset.staffEmail, btn.dataset.staffId));
            });

            document.querySelectorAll('.btn-action-delete').forEach(btn => {
                btn.addEventListener('click', () => openDeleteModal(btn.dataset.staffName, btn.dataset.staffId));
            });

            document.getElementById('closeStaffModalBtn')?.addEventListener('click', closeAllModals);
            document.getElementById('cancelStaffModalBtn')?.addEventListener('click', closeAllModals);
            document.getElementById('closeDeleteModalBtn')?.addEventListener('click', closeAllModals);
            document.getElementById('cancelDeleteModalBtn')?.addEventListener('click', closeAllModals);

            window.addEventListener('click', e => {
                if (e.target === staffModal || e.target === deleteModal) closeAllModals();
            });

            window.openCreateModal  = openCreateModal;
            window.openEditModal    = openEditModal;
            window.openDeleteModal  = openDeleteModal;
            window.closeAllModals   = closeAllModals;
        }
    </script>
</body>
</html>
