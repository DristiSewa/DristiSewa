{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DristiSewa{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/tailwind.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/pages/manager/manager.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="wrapper">

        <aside class="new-sidebar">
            <div class="new-sidebar-inner">
                <!-- Brand -->
                <div class="new-sidebar-brand">
                    <img src="{% static 'images/logo.png' %}" alt="DristiSewa Logo">
                    <h1>DristiSewa</h1>
                </div>
                <!-- Navigation -->
                <nav class="new-nav">
                    <div class="new-nav-group">
                        <p class="new-nav-label">Overview</p>
                        <a href="{% url 'accounts:branch_monitoring' %}"
                           class="new-nav-link {% if 'branch-monitoring' in request.path %}active{% endif %}">
                            <i class="fa-solid fa-code-branch"></i>
                            <span>Branch Monitoring</span>
                        </a>
                    </div>
                    <div class="new-nav-group">
                        <p class="new-nav-label">Management</p>
                        <a href="{% url 'accounts:followup_management' %}"
                           class="new-nav-link {% if 'followup-management' in request.path %}active{% endif %}">
                            <i class="fa-solid fa-bars-progress"></i>
                            <span>Followup Management</span>
                        </a>
                        <a href="{% url 'accounts:front_desk' %}"
                           class="new-nav-link {% if 'front-desk' in request.path %}active{% endif %}">
                            <i class="fa-solid fa-user-gear"></i>
                            <span>Front-desk Users</span>
                        </a>
                        <a href="{% url 'accounts:reports' %}"
                           class="new-nav-link {% if 'reports' in request.path %}active{% endif %}">
                            <i class="fa-solid fa-chart-line"></i>
                            <span>Reports &amp; Analytics</span>
                        </a>
                    </div>
                </nav>
            </div>
            <!-- Footer: Logout -->
            <div class="new-sidebar-footer">
                <a href="{% url 'accounts:logout' %}" class="new-nav-logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>

    </div>

    <script src="{% static 'js/pages/manager/manager.js' %}"></script>
</body>
</html>
