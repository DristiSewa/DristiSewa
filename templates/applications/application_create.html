{% extends "base.html" %}
{% block title %}New Application - DristiSewa{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="luxury-glass-card rounded-3xl p-8">
        <h1 class="text-xl font-black text-white mb-6 uppercase tracking-wide">New Application</h1>

        <form method="POST" class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            {% csrf_token %}
            <div class="space-y-1.5 sm:col-span-2">
                <label class="text-xs font-bold text-blue-400 uppercase tracking-wide">{{ form.student.label }}</label>
                {{ form.student }}
            </div>
            <div class="space-y-1.5">
                <label class="text-xs font-bold text-blue-400 uppercase tracking-wide">{{ form.destination_country.label }}</label>
                {{ form.destination_country }}
            </div>
            <div class="space-y-1.5">
                <label class="text-xs font-bold text-blue-400 uppercase tracking-wide">{{ form.institution.label }}</label>
                {{ form.institution }}
            </div>
            <div class="space-y-1.5 sm:col-span-2">
                <label class="text-xs font-bold text-blue-400 uppercase tracking-wide">{{ form.status.label }}</label>
                {{ form.status }}
            </div>
            <div class="space-y-1.5 sm:col-span-2">
                <label class="text-xs font-bold text-blue-400 uppercase tracking-wide">{{ form.remarks.label }}</label>
                {{ form.remarks }}
            </div>
            <div class="sm:col-span-2 flex justify-between items-center pt-2">
                <a href="{% url 'applications:application_list' %}" class="text-xs font-bold text-slate-400 hover:text-slate-200 uppercase tracking-wide">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Back
                </a>
                <button type="submit" class="btn-primary">Create <i class="fa-solid fa-floppy-disk"></i></button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
